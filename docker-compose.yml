services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chemistry_exam
      POSTGRES_USER: chemistry
      POSTGRES_PASSWORD: chemistry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemistry -d chemistry_exam"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env
    environment:
      CHEMISTRY_APP_ENV: development
      DATA_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://chemistry:chemistry@postgres:5432/chemistry_exam
      MEDIA_ROOT: /app/data/media
      API_PUBLIC_BASE_URL: http://127.0.0.1:8000
      TUS_UPLOAD_DIR: tus
      TUS_PUBLIC_ENDPOINT: http://127.0.0.1:10980/files/
    ports:
      - "8000:8000"
    volumes:
      - ./data/media:/app/data/media
      - ./apps/admin-web/dist:/app/apps/admin-web/dist:ro
    depends_on:
      postgres:
        condition: service_healthy

  tusd:
    image: tusproject/tusd:v2
    command:
      - "-host=0.0.0.0"
      - "-port=1080"
      - "-base-path=/files/"
      - "-upload-dir=/app/data/media/tus"
      - "-max-size=107374182400"
    ports:
      - "10980:1080"
    volumes:
      - ./data/media:/app/data/media

  video-worker:
    build:
      context: .
      dockerfile: server/Dockerfile.video-worker
    env_file:
      - .env
    environment:
      CHEMISTRY_APP_ENV: development
      DATA_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://chemistry:chemistry@postgres:5432/chemistry_exam
      MEDIA_ROOT: /app/data/media
      VIDEO_WORKER_ID: local-video-worker
      VIDEO_WORKER_POLL_SECONDS: 5
      VIDEO_LEARNING_MAX_WIDTH: 1280
      VIDEO_LEARNING_CRF: 24
      VIDEO_LEARNING_MAX_FPS: 30
      VIDEO_LEARNING_TRANSCODE_THRESHOLD_MB: 300
      VIDEO_SIMILARITY_ALGORITHM: vpdq-threatexchange-1.2.16
      VIDEO_SIMILARITY_COMMAND: python -m server.app.video_similarity vpdq-signature "{input}" "{output}"
      VIDEO_SIMILARITY_COMPARE_COMMAND: python -m server.app.video_similarity vpdq-compare "{current}" "{candidate}"
      VIDEO_SIMILARITY_THRESHOLD: 0.86
      VIDEO_VPDQ_SECONDS_PER_HASH: 1
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
