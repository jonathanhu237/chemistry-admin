name: chemistry-admin-old

# Legacy-only runtime for the old competition profile.
# It starts only the old backend adapter surface and the old student/teacher
# frontends. The core database is expected to be the shared project database
# exposed on the host, so this file does not start the main stack, Elasticsearch,
# video worker, web-student, web-teacher, or web-admin services.

services:
  backend-old:
    image: chemistry-admin-backend-old:legacy
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env
    environment:
      CHEMISTRY_APP_ENV: development
      DATA_BACKEND: postgres
      DATABASE_URL: ${OLD_DATABASE_URL:-postgresql+psycopg://chemistry:chemistry@host.docker.internal:15432/chemistry_exam}
      RUN_DB_CHECK_ON_STARTUP: "false"
      MEDIA_ROOT: /app/data/media
      API_PUBLIC_BASE_URL: ${OLD_API_PUBLIC_BASE_URL:-http://127.0.0.1:18000}
      FRONTEND_ALLOWED_ORIGINS: ${OLD_FRONTEND_ALLOWED_ORIGINS:-http://127.0.0.1:15176,http://localhost:15176,http://127.0.0.1:15177,http://localhost:15177,http://127.0.0.1:30076,http://localhost:30076,http://127.0.0.1:30077,http://localhost:30077}
      STUDENT_PREVIEW_APP_BASE_URL: ${OLD_STUDENT_PREVIEW_APP_BASE_URL:-http://127.0.0.1:15176}
      WEB_ADMIN_ACCESS_TOKEN: ${WEB_ADMIN_ACCESS_TOKEN:-dev-only-web-admin-token-change-me}
      VIDEO_LIBRARY_SEARCH_ENABLED: "false"
      VIDEO_LIBRARY_SEARCH_LOCAL_FALLBACK: "true"
    ports:
      - "${OLD_BACKEND_HOST_BIND:-127.0.0.1}:${OLD_BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - ./data/media:/app/data/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-student-old:
    image: chemistry-admin-web-student-old:legacy
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-student-old
    environment:
      BACKEND_UPSTREAM: http://backend-old:8000
      FRAME_ANCESTORS: "'self'"
    ports:
      - "${WEB_STUDENT_OLD_HOST_BIND:-127.0.0.1}:${WEB_STUDENT_OLD_HOST_PORT:-15176}:80"
    depends_on:
      backend-old:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-teacher-old:
    image: chemistry-admin-web-teacher-old:legacy
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-teacher-old
    environment:
      BACKEND_UPSTREAM: http://backend-old:8000
      FRAME_ANCESTORS: "'self'"
    ports:
      - "${WEB_TEACHER_OLD_HOST_BIND:-127.0.0.1}:${WEB_TEACHER_OLD_HOST_PORT:-15177}:80"
    depends_on:
      backend-old:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
